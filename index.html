<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ドコノコノキノコ.exe</title>
  <meta name="description" content="子供向けのきのこのうたから、文字化けと菌類ホラーへ崩れていく実験ページ。" />
  <meta property="og:title" content="ドコノコノキノコ.exe" />
  <meta property="og:description" content="かわいいキノコの入口から、狂気の菌類ページへ。" />
  <meta name="theme-color" content="#f7dd76" />

  <style>
    :root{
      --cute-bg:#fff7c9;
      --cute-bg2:#bdf2b4;
      --cute-pink:#ff7cb8;
      --cute-green:#59c45d;
      --cute-yellow:#ffe36f;
      --cute-brown:#875130;
      --cute-ink:#2d241d;

      --bad-bg:#050305;
      --bad-red:#ff1038;
      --bad-green:#74ff4d;
      --bad-purple:#9d40ff;
      --bad-yellow:#fff05a;
      --bad-ink:#f7ffe9;
      --bad-muted:rgba(247,255,233,.68);
      --bad-line:rgba(255,255,255,.16);
      --shadow:0 30px 120px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--cute-ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.92) 0 80px, transparent 82px),
        radial-gradient(circle at 86% 8%, rgba(255,255,255,.7) 0 70px, transparent 72px),
        radial-gradient(circle at 50% 105%, rgba(255,124,184,.22), transparent 48%),
        linear-gradient(180deg,var(--cute-bg),var(--cute-bg2));
      overflow-x:hidden;
      transition:background .18s linear, color .18s linear, filter .18s linear;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
      transition:opacity .16s linear, background .16s linear, filter .16s linear;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 22%, rgba(255,124,184,.34) 0 26px, transparent 28px),
        radial-gradient(circle at 34% 16%, rgba(255,227,111,.45) 0 18px, transparent 20px),
        radial-gradient(circle at 74% 25%, rgba(89,196,93,.36) 0 22px, transparent 24px),
        radial-gradient(circle at 91% 60%, rgba(255,124,184,.30) 0 30px, transparent 32px),
        radial-gradient(circle at 20% 82%, rgba(89,196,93,.25) 0 28px, transparent 30px);
      opacity:.82;
    }
    body::after{
      background:
        linear-gradient(90deg, rgba(255,255,255,.22) 2px, transparent 2px),
        linear-gradient(180deg, rgba(255,255,255,.18) 2px, transparent 2px);
      background-size:48px 48px;
      opacity:.18;
      mix-blend-mode:soft-light;
    }

    .stage{
      min-height:100vh;
      position:relative;
      display:grid;
      place-items:center;
      padding:26px 14px 42px;
      overflow:hidden;
    }

    .mushroom-field,
    .rain-layer,
    .eye-layer,
    .mojibake-layer{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .mushroom-field{z-index:0}
    .rain-layer{z-index:7}
    .eye-layer{z-index:2; opacity:0; transition:opacity .12s linear}
    .mojibake-layer{z-index:3; opacity:0; transition:opacity .2s linear}

    .mush{
      position:absolute;
      width:78px;
      height:92px;
      opacity:.78;
      filter:drop-shadow(0 10px 16px rgba(75,45,22,.18));
      animation:bob 4.8s ease-in-out infinite;
    }
    .mush::before{
      content:"";
      position:absolute;
      left:4px; right:4px; top:0;
      height:48px;
      border-radius:48px 48px 20px 20px;
      background:
        radial-gradient(circle at 26% 30%, #fff 0 7px, transparent 8px),
        radial-gradient(circle at 57% 22%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 74% 48%, #fff 0 6px, transparent 7px),
        linear-gradient(180deg,var(--cute-pink),#e64182);
      border:3px solid rgba(111,62,44,.35);
    }
    .mush::after{
      content:"";
      position:absolute;
      left:24px; top:38px;
      width:30px; height:50px;
      border-radius:14px 14px 20px 20px;
      background:#ffe0aa;
      border:3px solid rgba(111,62,44,.32);
    }
    .mush .eye{
      position:absolute;
      top:48px;
      width:6px; height:9px;
      border-radius:999px;
      background:#312114;
      z-index:2;
    }
    .mush .eye.l{left:32px}
    .mush .eye.r{left:45px}
    .mush .mouth{
      position:absolute;
      left:37px; top:62px;
      width:11px; height:6px;
      border-bottom:2px solid #312114;
      border-radius:0 0 999px 999px;
      z-index:2;
    }

    .m1{left:4%; bottom:7%; transform:rotate(-8deg); animation-delay:.1s}
    .m2{left:15%; top:16%; transform:scale(.72) rotate(8deg); animation-delay:.6s}
    .m3{right:8%; top:18%; transform:scale(.9) rotate(-7deg); animation-delay:1.2s}
    .m4{right:16%; bottom:9%; transform:scale(1.12) rotate(6deg); animation-delay:.3s}
    .m5{left:48%; bottom:2%; transform:scale(.8) rotate(-2deg); animation-delay:1.8s}
    @keyframes bob{
      0%,100%{translate:0 0}
      50%{translate:0 -12px}
    }

    .panel{
      width:min(1080px,100%);
      position:relative;
      z-index:4;
      border-radius:32px;
      background:rgba(255,255,255,.78);
      border:5px solid rgba(255,255,255,.78);
      box-shadow:0 24px 70px rgba(70,95,35,.22), inset 0 0 0 3px rgba(255,226,99,.65);
      overflow:hidden;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .cute-head{
      padding:24px 22px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      background:
        radial-gradient(circle at 8% 30%, rgba(255,124,184,.25), transparent 24%),
        linear-gradient(90deg,rgba(255,227,111,.75),rgba(255,255,255,.35));
    }
    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:950;
      letter-spacing:.02em;
      font-size:clamp(24px,4vw,42px);
      line-height:1;
    }
    .logo-mark{
      width:56px; height:56px;
      border-radius:18px;
      background:
        radial-gradient(circle at 32% 34%, #fff 0 7px, transparent 8px),
        radial-gradient(circle at 62% 25%, #fff 0 5px, transparent 6px),
        linear-gradient(180deg,#ff84be,#d93677);
      border:3px solid rgba(67,43,29,.32);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      position:relative;
    }
    .logo-mark::after{
      content:"";
      position:absolute;
      left:19px; top:32px;
      width:18px; height:22px;
      border-radius:10px 10px 12px 12px;
      background:#ffdfaa;
      border:2px solid rgba(67,43,29,.28);
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:2px solid rgba(89,196,93,.45);
      font-weight:900;
      color:#3d8d36;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }
    .status-dot{
      width:10px; height:10px;
      border-radius:999px;
      background:#59c45d;
      box-shadow:0 0 0 6px rgba(89,196,93,.16);
    }

    .content{
      display:grid;
      grid-template-columns:minmax(0,1.35fr) minmax(290px,.65fr);
      gap:0;
    }
    .video-card{
      padding:22px;
      border-right:3px dashed rgba(135,81,48,.24);
    }
    .thumb-shell{
      position:relative;
      border-radius:26px;
      overflow:hidden;
      background:#111;
      aspect-ratio:16/9;
      box-shadow:0 22px 50px rgba(0,0,0,.22);
      border:6px solid #fff;
    }
    .thumb-shell img,
    .thumb-shell iframe,
    #player{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      object-fit:cover;
      display:block;
    }
    .thumb-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.30)),
        radial-gradient(circle at center, transparent 0 22%, rgba(0,0,0,.15) 62%);
      display:grid;
      place-items:center;
    }
    .play{
      width:104px; height:104px;
      border-radius:999px;
      border:6px solid #fff;
      background:linear-gradient(180deg,#ffdc67,#ff9d00);
      color:#fff;
      display:grid;
      place-items:center;
      font-size:46px;
      padding-left:7px;
      cursor:pointer;
      box-shadow:0 16px 34px rgba(0,0,0,.28), 0 0 0 12px rgba(255,255,255,.22);
      transition:transform .15s ease, filter .15s ease;
    }
    .play:hover{transform:scale(1.05); filter:brightness(1.04)}
    .caption{
      margin:14px 4px 0;
      color:rgba(45,36,29,.78);
      line-height:1.8;
      font-weight:700;
    }

    .side{
      padding:24px 22px;
      background:rgba(255,255,255,.45);
    }
    .side h1{
      margin:0;
      font-size:clamp(28px,4vw,52px);
      line-height:1.05;
      letter-spacing:.02em;
    }
    .side h1 .big{display:block;color:#d62c73;text-shadow:0 4px 0 rgba(255,255,255,.8)}
    .side p{
      color:rgba(45,36,29,.78);
      line-height:1.8;
      font-weight:700;
      margin:14px 0 0;
    }
    .cute-buttons{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .cute-btn{
      border:0;
      border-radius:999px;
      padding:13px 16px;
      font-weight:950;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(180deg,#ff7cb8,#d62c73);
      box-shadow:0 12px 22px rgba(214,44,115,.22);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      min-height:48px;
    }
    .cute-btn.secondary{
      color:#463426;
      background:linear-gradient(180deg,#fff,#ffe998);
    }

    .marquee{
      position:fixed;
      left:0; right:0; bottom:0;
      height:36px;
      z-index:8;
      display:flex;
      align-items:center;
      overflow:hidden;
      background:rgba(255,255,255,.62);
      border-top:2px solid rgba(255,255,255,.7);
      color:#d62c73;
      font-weight:950;
      white-space:nowrap;
    }
    .marquee span{
      display:inline-block;
      padding-right:44px;
      animation:marq 18s linear infinite;
    }
    @keyframes marq{to{transform:translateX(-100%)}}

    .moji{
      position:absolute;
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      color:var(--bad-green);
      text-shadow:0 0 12px rgba(116,255,77,.55);
      mix-blend-mode:screen;
      white-space:nowrap;
      animation:fall linear infinite;
    }
    @keyframes fall{
      from{translate:0 -10vh}
      to{translate:0 115vh}
    }

    .eye-symbol{
      position:absolute;
      font-size:clamp(26px,5vw,62px);
      line-height:1;
      opacity:.86;
      filter:drop-shadow(0 0 12px rgba(247,255,233,.45));
      animation:eyeFloat 1.6s ease-in-out infinite alternate;
      mix-blend-mode:screen;
    }
    @keyframes eyeFloat{
      from{transform:translateY(-6px) scale(.96)}
      to{transform:translateY(7px) scale(1.08)}
    }

    .warning-log{
      position:fixed;
      left:14px;
      right:14px;
      bottom:48px;
      z-index:9;
      display:none;
      max-width:820px;
      margin:auto;
      padding:12px 14px;
      border:1px solid rgba(116,255,77,.36);
      background:rgba(0,0,0,.78);
      color:var(--bad-green);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      font-size:13px;
      line-height:1.5;
      box-shadow:0 0 38px rgba(116,255,77,.12);
    }

    /* ===== corrupted base ===== */
    body.corrupted{
      color:var(--bad-ink);
      background:
        radial-gradient(900px 640px at 20% 18%, rgba(255,16,56,.22), transparent 58%),
        radial-gradient(800px 520px at 82% 28%, rgba(116,255,77,.15), transparent 62%),
        radial-gradient(700px 540px at 50% 100%, rgba(157,64,255,.18), transparent 64%),
        linear-gradient(180deg,#050305,#110205 42%,#030503);
      animation:screenPulse 1.6s steps(2,end) infinite;
    }
    body.corrupted::before{
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(90deg, rgba(255,16,56,.10) 0 1px, transparent 1px 9px),
        radial-gradient(circle at 20% 22%, rgba(255,16,56,.38), transparent 18%),
        radial-gradient(circle at 74% 38%, rgba(116,255,77,.30), transparent 16%);
      opacity:.78;
      mix-blend-mode:screen;
    }
    body.corrupted::after{
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.22), transparent 3px),
        radial-gradient(circle at 70% 30%, rgba(116,255,77,.28), transparent 2px),
        radial-gradient(circle at 46% 72%, rgba(255,16,56,.30), transparent 3px);
      background-size:70px 80px, 110px 120px, 160px 150px;
      opacity:.68;
      animation:sporeDrift 2.4s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes screenPulse{
      0%,100%{filter:none}
      50%{filter:contrast(1.22) saturate(1.25) hue-rotate(-8deg)}
    }
    @keyframes sporeDrift{to{transform:translate3d(-30px,40px,0)}}

    body.corrupted .mush{
      opacity:.92;
      filter:drop-shadow(0 0 20px rgba(116,255,77,.32)) contrast(1.4) saturate(1.4);
      animation:badBob .42s steps(2,end) infinite;
    }
    body.corrupted .mush::before{
      background:
        radial-gradient(circle at 26% 30%, #f7ffe9 0 5px, transparent 6px),
        radial-gradient(circle at 57% 22%, #f7ffe9 0 4px, transparent 5px),
        radial-gradient(circle at 74% 48%, #f7ffe9 0 5px, transparent 6px),
        linear-gradient(180deg,#52111f,#ff1038 58%,#1b0108);
      border-color:rgba(116,255,77,.38);
    }
    body.corrupted .mush::after{
      background:#d6ffc4;
      border-color:rgba(255,16,56,.44);
    }
    body.corrupted .mush .eye{
      width:13px; height:13px;
      background:#f7ffe9;
      border:3px solid #050305;
      box-shadow:0 0 18px rgba(247,255,233,.55);
    }
    body.corrupted .mush .eye.l{left:28px; top:45px}
    body.corrupted .mush .eye.r{left:47px; top:47px}
    body.corrupted .mush .mouth{
      left:34px; top:64px;
      width:22px; height:12px;
      background:#050305;
      border:2px solid rgba(255,16,56,.9);
      border-radius:0 0 999px 999px;
      box-shadow:0 0 18px rgba(255,16,56,.48);
    }
    @keyframes badBob{
      0%,100%{translate:0 0; rotate:0deg}
      50%{translate:3px -5px; rotate:2deg}
    }

    body.corrupted .panel{
      border-radius:0;
      background:rgba(0,0,0,.80);
      border:1px solid rgba(116,255,77,.28);
      box-shadow:0 0 90px rgba(255,16,56,.22), inset 0 0 0 1px rgba(255,16,56,.32);
      animation:panelGlitch .16s steps(2,end) infinite;
    }
    @keyframes panelGlitch{
      0%,100%{transform:translate(0,0)}
      50%{transform:translate(1px,-1px)}
    }
    body.corrupted .cute-head{
      background:
        repeating-linear-gradient(90deg, rgba(255,16,56,.20) 0 8px, rgba(116,255,77,.12) 8px 13px, rgba(0,0,0,.0) 13px 19px),
        #090909;
      border-bottom:1px solid rgba(116,255,77,.22);
    }
    body.corrupted .logo,
    body.corrupted .side h1{
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      color:var(--bad-green);
      text-shadow:2px 0 var(--bad-red), -2px 0 var(--bad-purple), 0 0 20px rgba(116,255,77,.35);
      letter-spacing:.02em;
    }
    body.corrupted .logo-mark{
      background:
        radial-gradient(circle at 35% 34%, #fff 0 9px, transparent 10px),
        radial-gradient(circle at 65% 32%, #fff 0 8px, transparent 9px),
        linear-gradient(180deg,#35020d,#ff1038);
      border-color:rgba(116,255,77,.45);
    }
    body.corrupted .status-pill{
      background:#060606;
      color:var(--bad-green);
      border-color:rgba(116,255,77,.48);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      box-shadow:0 0 30px rgba(116,255,77,.12);
    }
    body.corrupted .status-dot{
      background:var(--bad-red);
      box-shadow:0 0 0 7px rgba(255,16,56,.15), 0 0 22px rgba(255,16,56,.8);
    }
    body.corrupted .video-card{
      border-right:1px solid rgba(116,255,77,.22);
    }
    body.corrupted .thumb-shell{
      border-color:rgba(116,255,77,.28);
      border-radius:0;
      box-shadow:0 0 60px rgba(255,16,56,.20);
    }
    body.corrupted .caption,
    body.corrupted .side p{
      color:var(--bad-muted);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
    }
    body.corrupted .cute-btn{
      background:#080808;
      color:var(--bad-green);
      border:1px solid rgba(116,255,77,.38);
      box-shadow:0 0 30px rgba(116,255,77,.12);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
    }
    body.corrupted .cute-btn.secondary{
      color:var(--bad-yellow);
      border-color:rgba(255,240,90,.4);
    }
    body.corrupted .marquee{
      background:#020202;
      border-top:1px solid rgba(116,255,77,.4);
      color:var(--bad-green);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      text-shadow:0 0 12px rgba(116,255,77,.45);
    }
    body.corrupted .mojibake-layer{opacity:1}
    body.corrupted .warning-log{display:block}

    .flash{
      position:fixed;
      inset:0;
      z-index:99;
      background:#fff;
      pointer-events:none;
      opacity:0;
    }
    .flash.active{animation:flashBang .58s steps(3,end)}
    @keyframes flashBang{
      0%{opacity:0}
      12%{opacity:1}
      26%{opacity:.15}
      42%{opacity:.9}
      100%{opacity:0}
    }

    /* ===== timeline effects ===== */
    body.fx-glitch{
      animation:hardGlitch .12s steps(2,end) infinite !important;
    }
    body.fx-glitch .panel,
    body.fx-glitch .thumb-shell{
      filter:contrast(1.9) saturate(1.8) hue-rotate(80deg);
      transform:translate(-4px,2px) skewX(-1deg);
    }
    body.fx-glitch::before{
      opacity:1;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255,0,64,.38) 18% 21%, transparent 21% 56%, rgba(0,255,170,.28) 56% 59%, transparent 59%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.16) 0 2px, transparent 2px 6px);
    }
    @keyframes hardGlitch{
      0%,100%{transform:translate(0,0); filter:none}
      25%{transform:translate(5px,-3px); filter:hue-rotate(90deg) contrast(1.45)}
      50%{transform:translate(-4px,2px); filter:invert(.18) saturate(2)}
      75%{transform:translate(2px,4px); filter:hue-rotate(-70deg) contrast(1.6)}
    }

    body.fx-invert{
      filter:invert(1) hue-rotate(180deg) contrast(1.6) saturate(1.8);
    }

    body.fx-psy{
      background:
        conic-gradient(from 0deg at 50% 50%, #ff0048, #ffe600, #00ff73, #00b7ff, #8b00ff, #ff0048),
        repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.24) 0 8px, rgba(0,0,0,.20) 8px 16px);
      animation:psySpin .26s linear infinite, screenPulse .6s steps(2,end) infinite !important;
    }
    body.fx-psy::before{
      background:repeating-conic-gradient(from 0deg, rgba(255,255,255,.28) 0 10deg, transparent 10deg 18deg);
      opacity:.88;
      mix-blend-mode:overlay;
      animation:psyZoom .33s ease-in-out infinite alternate;
    }
    @keyframes psySpin{to{filter:hue-rotate(360deg) saturate(2.5) contrast(1.4)}}
    @keyframes psyZoom{from{transform:scale(1)} to{transform:scale(1.08) rotate(3deg)}}

    body.fx-blackout{
      background:#000 !important;
      color:#050505;
      animation:none !important;
    }
    body.fx-blackout::before,
    body.fx-blackout::after{
      opacity:0 !important;
    }
    body.fx-blackout .panel,
    body.fx-blackout .mushroom-field,
    body.fx-blackout .marquee{
      opacity:.02;
      filter:brightness(.06);
    }

    body.fx-black-noise{
      background:#000 !important;
      animation:none !important;
    }
    body.fx-black-noise::before{
      opacity:.82;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.10) 0 1px, transparent 1px 5px),
        linear-gradient(90deg, transparent 0 12%, rgba(116,255,77,.16) 12% 13%, transparent 13% 58%, rgba(255,16,56,.20) 58% 59%, transparent 59%);
      animation:noiseRun .75s steps(3,end) infinite;
    }
    body.fx-black-noise::after{
      opacity:.20;
      background:repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.35) 0 1px, transparent 1px 4px);
      background-size:120px 90px;
      mix-blend-mode:screen;
    }
    @keyframes noiseRun{
      0%,100%{transform:translate(0,0); filter:contrast(1)}
      33%{transform:translate(18px,-10px); filter:contrast(3)}
      66%{transform:translate(-12px,7px); filter:contrast(1.5)}
    }

    body.fx-red{
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.12) 0 28px, transparent 29px),
        radial-gradient(circle at 25% 62%, rgba(255,0,45,.62) 0 54px, transparent 55px),
        radial-gradient(circle at 80% 28%, rgba(255,0,45,.54) 0 72px, transparent 73px),
        radial-gradient(circle at 55% 92%, rgba(255,0,45,.62) 0 120px, transparent 121px),
        linear-gradient(180deg,#140005,#020202);
      animation:redThrob .2s steps(2,end) infinite !important;
    }
    body.fx-red::before{
      opacity:.92;
      background:
        repeating-linear-gradient(115deg, rgba(255,16,56,.32) 0 12px, transparent 12px 26px),
        radial-gradient(circle at 40% 40%, rgba(255,16,56,.42), transparent 22%);
      mix-blend-mode:screen;
    }
    @keyframes redThrob{
      0%,100%{filter:saturate(1.3) contrast(1.1)}
      50%{filter:saturate(2.3) contrast(1.5) brightness(.82)}
    }

    body.fx-eyes .eye-layer{
      opacity:1;
    }
    body.fx-eyes{
      background:
        radial-gradient(circle at 18% 20%, rgba(247,255,233,.20), transparent 11%),
        radial-gradient(circle at 72% 28%, rgba(247,255,233,.20), transparent 13%),
        radial-gradient(circle at 46% 74%, rgba(247,255,233,.18), transparent 14%),
        linear-gradient(180deg,#010101,#180309);
    }

    body.fx-taisho{
      color:#2a140b;
      background:
        radial-gradient(circle at 80% 18%, rgba(172,21,21,.30) 0 82px, transparent 84px),
        linear-gradient(90deg, rgba(124,58,28,.16) 0 1px, transparent 1px),
        linear-gradient(180deg,#f0d69b,#c89a60 60%,#3a1f12);
      background-size:auto, 38px 38px, auto;
      animation:paperJitter .18s steps(2,end) infinite !important;
    }
    body.fx-taisho::before{
      opacity:.82;
      background:
        repeating-linear-gradient(90deg, rgba(73,31,15,.16) 0 14px, transparent 14px 30px),
        radial-gradient(circle at 20% 30%, rgba(125,0,0,.20), transparent 20%);
      mix-blend-mode:multiply;
    }
    body.fx-taisho::after{
      content:"キノコ商會　大正拾弐年　怪異広告";
      display:grid;
      place-items:center;
      color:rgba(66,20,12,.68);
      font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
      font-size:clamp(24px,7vw,88px);
      font-weight:900;
      letter-spacing:.12em;
      writing-mode:vertical-rl;
      opacity:.42;
      background:none;
      mix-blend-mode:multiply;
    }
    @keyframes paperJitter{50%{filter:sepia(.65) contrast(1.2)}}

    body.fx-optical{
      background:
        repeating-conic-gradient(from 0deg at 50% 50%, #000 0 10deg, #fff 10deg 20deg),
        repeating-radial-gradient(circle at 50% 50%, rgba(116,255,77,.38) 0 8px, transparent 8px 16px);
      background-blend-mode:difference;
      animation:opticalSpin .9s linear infinite !important;
    }
    body.fx-optical::before{
      opacity:.55;
      background:repeating-linear-gradient(45deg, rgba(255,16,56,.18) 0 8px, rgba(116,255,77,.18) 8px 16px);
      mix-blend-mode:difference;
    }
    @keyframes opticalSpin{
      to{filter:hue-rotate(360deg) contrast(1.6)}
    }

    body.fx-wave{
      background:#020202;
      animation:waveBoom .24s ease-in-out infinite !important;
    }
    body.fx-wave::before{
      opacity:.95;
      background:
        repeating-radial-gradient(ellipse at 50% 50%, rgba(116,255,77,.0) 0 18px, rgba(116,255,77,.45) 19px 23px, transparent 24px 34px),
        repeating-linear-gradient(90deg, rgba(255,16,56,.10) 0 1px, transparent 1px 14px);
      animation:wavePulse .32s ease-in-out infinite;
      mix-blend-mode:screen;
    }
    body.fx-wave::after{
      opacity:.72;
      background:
        linear-gradient(90deg, transparent 0 7%, rgba(255,255,255,.35) 8% 9%, transparent 10% 22%, rgba(255,255,255,.22) 23% 24%, transparent 25%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.10) 0 2px, transparent 2px 8px);
      animation:waveSlide .16s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes waveBoom{
      0%,100%{filter:brightness(.8) contrast(1.1)}
      50%{filter:brightness(1.8) contrast(2)}
    }
    @keyframes wavePulse{
      from{transform:scale(.82)}
      to{transform:scale(1.28)}
    }
    @keyframes waveSlide{
      to{transform:translateX(36px)}
    }

    .falling-mush{
      position:absolute;
      top:-90px;
      width:42px;
      height:52px;
      font-size:42px;
      line-height:1;
      filter:drop-shadow(0 0 12px rgba(116,255,77,.45));
      animation:mushFall var(--fall-duration, 2.8s) linear forwards;
      opacity:.95;
    }
    @keyframes mushFall{
      to{transform:translateY(120vh) rotate(var(--rot, 360deg))}
    }

    @media (max-width:860px){
      .content{grid-template-columns:1fr}
      .video-card{border-right:0;border-bottom:3px dashed rgba(135,81,48,.24)}
      body.corrupted .video-card{border-bottom:1px solid rgba(116,255,77,.22)}
      .side{padding:20px}
      .play{width:86px;height:86px;font-size:38px}
    }
    @media (max-width:560px){
      .stage{padding:14px 10px 42px}
      .panel{border-radius:24px}
      .cute-head{padding:18px 16px}
      .logo-mark{width:46px;height:46px}
      .video-card{padding:16px}
      .thumb-shell{border-width:4px;border-radius:18px}
      .mush{width:56px;height:70px}
      .warning-log{font-size:12px;bottom:42px}
    }

    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none !important; transition:none !important; scroll-behavior:auto !important}
      body.corrupted{filter:none}
      body.corrupted .mojibake-layer{opacity:.45}
    }
  </style>
</head>

<body>
  <div class="flash" id="flash" aria-hidden="true"></div>

  <div class="mushroom-field" aria-hidden="true">
    <span class="mush m1"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></span>
    <span class="mush m2"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></span>
    <span class="mush m3"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></span>
    <span class="mush m4"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></span>
    <span class="mush m5"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></span>
  </div>

  <div class="mojibake-layer" id="mojibakeLayer" aria-hidden="true"></div>
  <div class="rain-layer" id="rainLayer" aria-hidden="true"></div>
  <div class="eye-layer" id="eyeLayer" aria-hidden="true"></div>
  <div class="warning-log" id="warningLog">[KINOCO_SYS] かわいい きのこ を 読み込み中...</div>

  <main class="stage">
    <section class="panel" aria-label="mushroom video gate">
      <header class="cute-head">
        <div class="logo">
          <span class="logo-mark" aria-hidden="true"></span>
          <span class="glitch-text" data-clean="ドコノコノキノコ">ドコノコノキノコ</span>
        </div>
        <div class="status-pill"><span class="status-dot"></span><span class="glitch-text" data-clean="こども向け安全モード">こども向け安全モード</span></div>
      </header>

      <div class="content">
        <div class="video-card">
          <div class="thumb-shell" id="videoShell">
            <img
              id="coverThumb"
              src="https://img.youtube.com/vi/iH0ze-eg54Y/hqdefault.jpg"
              alt="子供向けキノコ動画のYouTubeサムネイル">
            <div class="thumb-overlay" id="thumbOverlay">
              <button class="play" id="enterBtn" type="button" aria-label="再生する">▶</button>
            </div>
          </div>
          <p class="caption glitch-text" data-clean="さいしょは、たのしいキノコのうた。再生ボタンを押すと、きのこの奥にある別の部屋が開きます。">
            さいしょは、たのしいキノコのうた。再生ボタンを押すと、きのこの奥にある別の部屋が開きます。
          </p>
        </div>

        <aside class="side">
          <h1><span class="big glitch-text" data-clean="きのこが">きのこが</span><span class="glitch-text" data-clean="おどるよ">おどるよ</span></h1>
          <p class="glitch-text" data-clean="目と口のあるキノコ。歌って、踊って、増えていく。かわいいはずなのに、なぜか見てはいけない気がする。">
            目と口のあるキノコ。歌って、踊って、増えていく。かわいいはずなのに、なぜか見てはいけない気がする。
          </p>

          <div class="cute-buttons">
            <button class="cute-btn" id="panicBtn" type="button">▶ あそぶ</button>
            <a class="cute-btn secondary" href="https://tomoponz.github.io/shell.html?p=gallery.html">ネタ置き場へ戻る</a>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <div class="marquee" aria-hidden="true">
    <span id="marqueeText">🍄 ドコノコノキノコ　ドコノコノキノコ　ドコノコノキノコ　</span>
    <span>🍄 ドコノコノキノコ　ドコノコノキノコ　ドコノコノキノコ　</span>
    <span>🍄 ドコノコノキノコ　ドコノコノキノコ　ドコノコノキノコ　</span>
  </div>

  <script>
    (() => {
      "use strict";

      const MAIN_VIDEO_ID = "NYnpsWrVGKg";
      const coverThumb = document.getElementById("coverThumb");
      const thumbOverlay = document.getElementById("thumbOverlay");
      const videoShell = document.getElementById("videoShell");
      const enterBtn = document.getElementById("enterBtn");
      const panicBtn = document.getElementById("panicBtn");
      const flash = document.getElementById("flash");
      const warningLog = document.getElementById("warningLog");
      const marqueeText = document.getElementById("marqueeText");
      const glitchTargets = Array.from(document.querySelectorAll(".glitch-text"));
      const mojibakeLayer = document.getElementById("mojibakeLayer");
      const rainLayer = document.getElementById("rainLayer");
      const eyeLayer = document.getElementById("eyeLayer");

      const corruptChars = "縺繧譁荳蜑笘繝蟆隧髫莠邱驥謗蜿譛螟蟄莨譛�▒▓█░ﾄﾞｺﾉｷﾉｺ";
      const logLines = [
        "[KINOCO_SYS] 目玉パーツを同期しています...",
        "[DOKO_NODE] 繝峨さ繝弱さ縺悟｢怜殖荳ｭ...",
        "[NHKID_SIM] child_safe_palette=false",
        "[SPORE] 胞子密度: 122%",
        "[FACE_MESH] 口角検出に失敗しました",
        "[MEME_CORE] 文字化けを連続生成中...",
        "[KINOCO] ドコノコノキノコ ドコノコノキノｺ 縺薙?",
        "[WARNING] かわいい と こわい の境界が見つかりません"
      ];

      const effectClasses = [
        "fx-psy",
        "fx-blackout",
        "fx-black-noise",
        "fx-red",
        "fx-eyes",
        "fx-taisho",
        "fx-optical",
        "fx-wave"
      ];

      let glitchRate = 0.08;
      let mojibakeTimer = null;
      let logTimer = null;
      let timelineTimer = null;
      let player = null;
      let playerReady = false;
      let timelineStarted = false;
      let fired = new Set();
      let rainTimer = null;
      let activeBackgroundTimer = null;

      const timelineEvents = [
        { time: 9, id: "glitch-009", action: () => triggerGlitch(620, "0:09 GLITCH") },
        { time: 18, id: "invert-018", action: () => temporaryBodyClass("fx-invert", 520, "0:18 INVERT") },
        { time: 28, id: "psy-028", action: () => setBackgroundEffect("fx-psy", 3000, "0:28 PSYCHEDELIC") },
        { time: 41, id: "black-041", action: () => setBackgroundEffect("fx-blackout", 1000, "0:41 BLACKOUT") },
        { time: 54, id: "black-054", action: () => setBackgroundEffect("fx-blackout", 1000, "0:54 BLACKOUT") },
        { time: 56, id: "glitch-056", action: () => triggerGlitch(700, "0:56 GLITCH") },
        { time: 66, id: "red-106", action: () => setBackgroundEffect("fx-red", 4000, "1:06 RED SPLATTER") },
        { time: 72, id: "eyes-112", action: () => setBackgroundEffect("fx-eyes", 3000, "1:12 EYES") },
        { time: 84, id: "taisho-124", action: () => setBackgroundEffect("fx-taisho", 2000, "1:24 TAISHO AD") },
        { time: 86, id: "optical-126", action: () => setBackgroundEffect("fx-optical", null, "1:26 OPTICAL") },
        { time: 94, id: "rain-134", action: () => startMushroomRain("1:34 MUSHROOM RAIN") },
        { time: 95, id: "rainstop-135", action: () => { stopMushroomRain(); setBackgroundEffect("fx-black-noise", null, "1:35 BLACK NOISE"); } },
        { time: 107, id: "wave-147", action: () => { stopMushroomRain(); setBackgroundEffect("fx-wave", 5000, "1:47 WAVEFORM"); } }
      ];

      function randomChar() {
        return corruptChars.charAt(Math.floor(Math.random() * corruptChars.length));
      }

      function corruptText(text, rate) {
        return String(text || "")
          .split("")
          .map((ch) => {
            if (ch.trim() === "") return ch;
            return Math.random() < rate ? randomChar() : ch;
          })
          .join("");
      }

      function flashBang() {
        flash.classList.remove("active");
        void flash.offsetWidth;
        flash.classList.add("active");
      }

      function writeLog(label) {
        const line = label || logLines[Math.floor(Math.random() * logLines.length)];
        const t = player && typeof player.getCurrentTime === "function"
          ? player.getCurrentTime().toFixed(2)
          : "--";
        warningLog.textContent = `[${t}s] ${line} / ${logLines[Math.floor(Math.random() * logLines.length)]}`;
      }

      function startMojibake() {
        if (mojibakeTimer) clearInterval(mojibakeTimer);

        glitchTargets.forEach((target) => {
          target.dataset.clean = target.dataset.clean || target.textContent;
        });

        mojibakeTimer = setInterval(() => {
          glitchTargets.forEach((target) => {
            const clean = target.dataset.clean || target.textContent || "";
            target.textContent = corruptText(clean, glitchRate);
          });
          marqueeText.textContent = corruptText("🍄 ドコノコノキノコ　ドコノコノキノコ　ドコノコノキノコ　", Math.min(0.72, glitchRate + 0.18));
        }, 78);
      }

      function startLogs() {
        if (logTimer) clearInterval(logTimer);
        logTimer = setInterval(() => {
          writeLog();
        }, 520);
      }

      function buildMojibakeRain() {
        mojibakeLayer.innerHTML = "";
        const count = 42;
        for (let i = 0; i < count; i++) {
          const span = document.createElement("span");
          span.className = "moji";
          span.textContent = Array.from({ length: 8 + Math.floor(Math.random() * 18) }, randomChar).join("");
          span.style.left = `${Math.random() * 100}%`;
          span.style.top = `${Math.random() * -100}vh`;
          span.style.fontSize = `${12 + Math.random() * 26}px`;
          span.style.animationDuration = `${3 + Math.random() * 7}s`;
          span.style.animationDelay = `${Math.random() * 3}s`;
          mojibakeLayer.appendChild(span);
        }
      }

      function buildEyeLayer() {
        eyeLayer.innerHTML = "";
        for (let i = 0; i < 55; i++) {
          const eye = document.createElement("span");
          eye.className = "eye-symbol";
          eye.textContent = Math.random() < 0.82 ? "👁" : "◉";
          eye.style.left = `${Math.random() * 100}%`;
          eye.style.top = `${Math.random() * 100}%`;
          eye.style.animationDelay = `${Math.random() * 1.5}s`;
          eye.style.transform = `rotate(${Math.random() * 360}deg)`;
          eyeLayer.appendChild(eye);
        }
      }

      function clearBackgroundEffects() {
        document.body.classList.remove(...effectClasses);
        if (activeBackgroundTimer) {
          clearTimeout(activeBackgroundTimer);
          activeBackgroundTimer = null;
        }
      }

      function setBackgroundEffect(className, durationMs = null, label = "") {
        clearBackgroundEffects();
        document.body.classList.add(className);
        writeLog(label);
        if (className === "fx-eyes") buildEyeLayer();
        if (durationMs) {
          activeBackgroundTimer = setTimeout(() => {
            document.body.classList.remove(className);
            activeBackgroundTimer = null;
          }, durationMs);
        }
      }

      function temporaryBodyClass(className, durationMs, label = "") {
        document.body.classList.add(className);
        writeLog(label);
        setTimeout(() => {
          document.body.classList.remove(className);
        }, durationMs);
      }

      function triggerGlitch(durationMs = 620, label = "GLITCH") {
        glitchRate = Math.min(0.88, glitchRate + 0.16);
        flashBang();
        temporaryBodyClass("fx-glitch", durationMs, label);
        document.title = corruptText("ドコノコノキノコ.exe", 0.45);
      }

      function spawnFallingMushroom() {
        const mush = document.createElement("span");
        mush.className = "falling-mush";
        mush.textContent = Math.random() < 0.78 ? "🍄" : "☠";
        mush.style.left = `${Math.random() * 100}%`;
        mush.style.setProperty("--fall-duration", `${1.4 + Math.random() * 2.2}s`);
        mush.style.setProperty("--rot", `${(Math.random() > 0.5 ? 1 : -1) * (240 + Math.random() * 620)}deg`);
        mush.style.fontSize = `${28 + Math.random() * 44}px`;
        rainLayer.appendChild(mush);
        setTimeout(() => mush.remove(), 4200);
      }

      function startMushroomRain(label = "MUSHROOM RAIN") {
        writeLog(label);
        for (let i = 0; i < 90; i++) {
          setTimeout(spawnFallingMushroom, i * 8);
        }
        if (rainTimer) clearInterval(rainTimer);
        rainTimer = setInterval(() => {
          for (let i = 0; i < 5; i++) spawnFallingMushroom();
        }, 90);
      }

      function stopMushroomRain() {
        if (rainTimer) {
          clearInterval(rainTimer);
          rainTimer = null;
        }
        writeLog("MUSHROOM RAIN STOP");
      }

      function resetTimelineForReplay() {
        fired = new Set();
        clearBackgroundEffects();
        stopMushroomRain();
        rainLayer.innerHTML = "";
        glitchRate = 0.18;
      }

      function enterCorruptionBase() {
        document.body.classList.add("corrupted");
        document.documentElement.lang = "ja";
        document.title = "ﾄﾞｺﾉｺﾉｷﾉｺ.exe";
        buildMojibakeRain();
        startMojibake();
        startLogs();
        flashBang();
        glitchRate = 0.20;
      }

      function endToCorruptedIdle() {
        stopMushroomRain();
        clearBackgroundEffects();
        rainLayer.innerHTML = "";
        document.body.classList.add("corrupted");
        glitchRate = 0.22;
        writeLog("[END] 狂気版通常状態へ復帰しました");
        document.title = "ドコノコノキノコ.exe";
      }

      function checkTimeline() {
        if (!playerReady || !player || typeof player.getCurrentTime !== "function") return;
        const now = player.getCurrentTime();

        if (now < 1 && fired.size > 0) {
          resetTimelineForReplay();
        }

        for (const event of timelineEvents) {
          if (now >= event.time && !fired.has(event.id)) {
            fired.add(event.id);
            event.action();
          }
        }

        glitchRate = Math.min(0.72, 0.18 + now / 230);
      }

      function startTimelineMonitor() {
        if (timelineTimer) clearInterval(timelineTimer);
        timelineTimer = setInterval(checkTimeline, 50);
      }

      function stopTimelineMonitor() {
        if (timelineTimer) {
          clearInterval(timelineTimer);
          timelineTimer = null;
        }
      }

      function loadYouTubeAPI() {
        return new Promise((resolve) => {
          if (window.YT && window.YT.Player) {
            resolve();
            return;
          }

          const old = window.onYouTubeIframeAPIReady;
          window.onYouTubeIframeAPIReady = () => {
            if (typeof old === "function") {
              try { old(); } catch (_) {}
            }
            resolve();
          };

          if (!document.querySelector("script[src='https://www.youtube.com/iframe_api']")) {
            const tag = document.createElement("script");
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
          }
        });
      }

      async function startMainVideo() {
        if (timelineStarted) return;
        timelineStarted = true;

        enterCorruptionBase();
        coverThumb.remove();
        thumbOverlay.remove();

        const playerDiv = document.createElement("div");
        playerDiv.id = "player";
        videoShell.appendChild(playerDiv);

        await loadYouTubeAPI();

        player = new YT.Player("player", {
          videoId: MAIN_VIDEO_ID,
          playerVars: {
            autoplay: 1,
            playsinline: 1,
            rel: 0,
            modestbranding: 1,
            controls: 1
          },
          events: {
            onReady: (event) => {
              playerReady = true;
              writeLog("[YT_API] Player ready");
              try { event.target.playVideo(); } catch (_) {}
              startTimelineMonitor();
            },
            onStateChange: (event) => {
              if (!window.YT || !window.YT.PlayerState) return;
              if (event.data === YT.PlayerState.PLAYING) {
                startTimelineMonitor();
              } else if (event.data === YT.PlayerState.ENDED) {
                stopTimelineMonitor();
                endToCorruptedIdle();
              }
            },
            onError: () => {
              writeLog("[YT_API] 動画の読み込みに失敗しました");
            }
          }
        });
      }

      enterBtn.addEventListener("click", startMainVideo);
      panicBtn.addEventListener("click", startMainVideo);

      document.addEventListener("keydown", (event) => {
        if (event.shiftKey && event.key.toLowerCase() === "r") {
          location.reload();
        }
      });
    })();
  </script>
</body>
