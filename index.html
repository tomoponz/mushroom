<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ドコノコノキノコ.exe</title>
  <meta name="description" content="子供向けのきのこのうたから、文字化けと菌類ホラーへ崩れていく実験ページ。" />
  <meta property="og:title" content="ドコノコノキノコ.exe" />
  <meta property="og:description" content="かわいいキノコの入口から、狂気の菌類ページへ。" />
  <meta name="theme-color" content="#f7dd76" />

  <style>
    :root{
      --cute-bg:#fff7c9;
      --cute-bg2:#bdf2b4;
      --cute-pink:#ff7cb8;
      --cute-green:#59c45d;
      --cute-yellow:#ffe36f;
      --cute-brown:#875130;
      --cute-ink:#2d241d;

      --bad-bg:#050305;
      --bad-red:#ff1038;
      --bad-green:#74ff4d;
      --bad-purple:#9d40ff;
      --bad-yellow:#fff05a;
      --bad-ink:#f7ffe9;
      --bad-muted:rgba(247,255,233,.68);
      --bad-line:rgba(255,255,255,.16);
      --shadow:0 30px 120px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--cute-ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.92) 0 80px, transparent 82px),
        radial-gradient(circle at 86% 8%, rgba(255,255,255,.7) 0 70px, transparent 72px),
        radial-gradient(circle at 50% 105%, rgba(255,124,184,.22), transparent 48%),
        linear-gradient(180deg,var(--cute-bg),var(--cute-bg2));
      overflow-x:hidden;
      transition:background .18s linear, color .18s linear, filter .18s linear;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
      transition:opacity .16s linear, background .16s linear, filter .16s linear;
    }
    body::before{
      background:
        radial-gradient(circle at 12% 22%, rgba(255,124,184,.34) 0 26px, transparent 28px),
        radial-gradient(circle at 34% 16%, rgba(255,227,111,.45) 0 18px, transparent 20px),
        radial-gradient(circle at 74% 25%, rgba(89,196,93,.36) 0 22px, transparent 24px),
        radial-gradient(circle at 91% 60%, rgba(255,124,184,.30) 0 30px, transparent 32px),
        radial-gradient(circle at 20% 82%, rgba(89,196,93,.25) 0 28px, transparent 30px);
      opacity:.82;
    }
    body::after{
      background:
        linear-gradient(90deg, rgba(255,255,255,.22) 2px, transparent 2px),
        linear-gradient(180deg, rgba(255,255,255,.18) 2px, transparent 2px);
      background-size:48px 48px;
      opacity:.18;
      mix-blend-mode:soft-light;
    }

    .stage{
      min-height:100vh;
      position:relative;
      display:grid;
      place-items:center;
      padding:26px 14px 42px;
      overflow:hidden;
    }

    .mushroom-field,
    .rain-layer,
    .eye-under-layer,
    .eye-layer,
    .tab-storm-layer,
    .cross-layer,
    .mojibake-layer{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .mushroom-field{z-index:0}
    .rain-layer{z-index:7}
    .eye-under-layer{z-index:86; opacity:0; transition:opacity .12s linear}
    .eye-layer{z-index:87; opacity:0; transition:opacity .12s linear}
    body.fx-eyes .eye-under-layer{opacity:.98}
    .tab-storm-layer{z-index:96; opacity:0; transition:opacity .08s linear}
    .tab-storm-layer.active{opacity:1}

    .cross-layer{
      z-index:92;
      opacity:0;
      padding:10px 10px 52px;
      display:grid;
      grid-template-columns:repeat(var(--cross-cols, 16), var(--cross-cell, 52px));
      grid-auto-rows:var(--cross-cell, 52px);
      gap:2px;
      align-content:start;
      justify-content:start;
      transition:opacity .16s linear;
      mix-blend-mode:screen;
    }
    .cross-layer.active{opacity:.94}
    .cross-mark{
      display:grid;
      place-items:center;
      width:var(--cross-cell, 52px);
      height:var(--cross-cell, 52px);
      color:#f7ffe9;
      font-family:"Times New Roman","Yu Mincho",serif;
      font-size:calc(var(--cross-cell, 52px) * .78);
      line-height:1;
      text-shadow:
        2px 0 rgba(255,16,56,.88),
        -2px 0 rgba(116,255,77,.70),
        0 0 20px rgba(247,255,233,.52);
      filter:contrast(1.2);
      animation:crossPop .18s steps(2,end) both;
    }
    .cross-mark:nth-child(3n){color:#74ff4d}
    .cross-mark:nth-child(4n){color:#ff1038}
    .cross-mark:nth-child(5n){opacity:.68}
    @keyframes crossPop{
      from{transform:scale(.18); opacity:0; filter:blur(3px)}
      to{transform:scale(1); opacity:1; filter:blur(0)}
    }
    .mojibake-layer{z-index:3; opacity:0; transition:opacity .2s linear}

    .mush{
      position:absolute;
      width:78px;
      height:92px;
      opacity:.78;
      filter:drop-shadow(0 10px 16px rgba(75,45,22,.18));
      animation:bob 4.8s ease-in-out infinite;
    }
    .mush::before{
      content:"";
      position:absolute;
      left:4px; right:4px; top:0;
      height:48px;
      border-radius:48px 48px 20px 20px;
      background:
        radial-gradient(circle at 26% 30%, #fff 0 7px, transparent 8px),
        radial-gradient(circle at 57% 22%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 74% 48%, #fff 0 6px, transparent 7px),
        linear-gradient(180deg,var(--cute-pink),#e64182);
      border:3px solid rgba(111,62,44,.35);
    }
    .mush::after{
      content:"";
      position:absolute;
      left:24px; top:38px;
      width:30px; height:50px;
      border-radius:14px 14px 20px 20px;
      background:#ffe0aa;
      border:3px solid rgba(111,62,44,.32);
    }
    .mush .eye{
      position:absolute;
      top:48px;
      width:6px; height:9px;
      border-radius:999px;
      background:#312114;
      z-index:2;
    }
    .mush .eye.l{left:32px}
    .mush .eye.r{left:45px}
    .mush .mouth{
      position:absolute;
      left:37px; top:62px;
      width:11px; height:6px;
      border-bottom:2px solid #312114;
      border-radius:0 0 999px 999px;
      z-index:2;
    }

    .m1{left:4%; bottom:7%; transform:rotate(-8deg); animation-delay:.1s}
    .m2{left:15%; top:16%; transform:scale(.72) rotate(8deg); animation-delay:.6s}
    .m3{right:8%; top:18%; transform:scale(.9) rotate(-7deg); animation-delay:1.2s}
    .m4{right:16%; bottom:9%; transform:scale(1.12) rotate(6deg); animation-delay:.3s}
    .m5{left:48%; bottom:2%; transform:scale(.8) rotate(-2deg); animation-delay:1.8s}
    @keyframes bob{
      0%,100%{translate:0 0}
      50%{translate:0 -12px}
    }

    .panel{
      width:min(1080px,100%);
      position:relative;
      z-index:4;
      border-radius:32px;
      background:rgba(255,255,255,.78);
      border:5px solid rgba(255,255,255,.78);
      box-shadow:0 24px 70px rgba(70,95,35,.22), inset 0 0 0 3px rgba(255,226,99,.65);
      overflow:hidden;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .cute-head{
      padding:24px 22px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      background:
        radial-gradient(circle at 8% 30%, rgba(255,124,184,.25), transparent 24%),
        linear-gradient(90deg,rgba(255,227,111,.75),rgba(255,255,255,.35));
    }
    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:950;
      letter-spacing:.02em;
      font-size:clamp(24px,4vw,42px);
      line-height:1;
    }
    .logo-mark{
      width:56px; height:56px;
      border-radius:18px;
      background:
        radial-gradient(circle at 32% 34%, #fff 0 7px, transparent 8px),
        radial-gradient(circle at 62% 25%, #fff 0 5px, transparent 6px),
        linear-gradient(180deg,#ff84be,#d93677);
      border:3px solid rgba(67,43,29,.32);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      position:relative;
    }
    .logo-mark::after{
      content:"";
      position:absolute;
      left:19px; top:32px;
      width:18px; height:22px;
      border-radius:10px 10px 12px 12px;
      background:#ffdfaa;
      border:2px solid rgba(67,43,29,.28);
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:2px solid rgba(89,196,93,.45);
      font-weight:900;
      color:#3d8d36;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }
    .status-dot{
      width:10px; height:10px;
      border-radius:999px;
      background:#59c45d;
      box-shadow:0 0 0 6px rgba(89,196,93,.16);
    }

    .content{
      display:grid;
      grid-template-columns:minmax(0,1.35fr) minmax(290px,.65fr);
      gap:0;
    }
    .video-card{
      padding:22px;
      border-right:3px dashed rgba(135,81,48,.24);
    }
    .thumb-shell{
      position:relative;
      border-radius:26px;
      overflow:hidden;
      background:#111;
      aspect-ratio:16/9;
      box-shadow:0 22px 50px rgba(0,0,0,.22);
      border:6px solid #fff;
    }
    .thumb-shell img,
    .thumb-shell iframe,
    #player{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      object-fit:cover;
      display:block;
    }
    .thumb-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.30)),
        radial-gradient(circle at center, transparent 0 22%, rgba(0,0,0,.15) 62%);
      display:grid;
      place-items:center;
    }
    .play{
      width:104px; height:104px;
      border-radius:999px;
      border:6px solid #fff;
      background:linear-gradient(180deg,#ffdc67,#ff9d00);
      color:#fff;
      display:grid;
      place-items:center;
      font-size:46px;
      padding-left:7px;
      cursor:pointer;
      box-shadow:0 16px 34px rgba(0,0,0,.28), 0 0 0 12px rgba(255,255,255,.22);
      transition:transform .15s ease, filter .15s ease;
    }
    .play:hover{transform:scale(1.05); filter:brightness(1.04)}
    .caption{
      margin:14px 4px 0;
      color:rgba(45,36,29,.78);
      line-height:1.8;
      font-weight:700;
    }

    .side{
      padding:24px 22px;
      background:rgba(255,255,255,.45);
    }
    .side h1{
      margin:0;
      font-size:clamp(28px,4vw,52px);
      line-height:1.05;
      letter-spacing:.02em;
    }
    .side h1 .big{display:block;color:#d62c73;text-shadow:0 4px 0 rgba(255,255,255,.8)}
    .side p{
      color:rgba(45,36,29,.78);
      line-height:1.8;
      font-weight:700;
      margin:14px 0 0;
    }
    .cute-buttons{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .cute-btn{
      border:0;
      border-radius:999px;
      padding:13px 16px;
      font-weight:950;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(180deg,#ff7cb8,#d62c73);
      box-shadow:0 12px 22px rgba(214,44,115,.22);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      min-height:48px;
    }
    .cute-btn.secondary{
      color:#463426;
      background:linear-gradient(180deg,#fff,#ffe998);
    }

    .marquee{
      position:fixed;
      left:0; right:0; bottom:0;
      height:36px;
      z-index:8;
      display:flex;
      align-items:center;
      overflow:hidden;
      background:rgba(255,255,255,.62);
      border-top:2px solid rgba(255,255,255,.7);
      color:#d62c73;
      font-weight:950;
      white-space:nowrap;
    }
    .marquee span{
      display:inline-block;
      padding-right:44px;
      animation:marq 18s linear infinite;
    }
    @keyframes marq{to{transform:translateX(-100%)}}

    .moji{
      position:absolute;
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      color:var(--bad-green);
      text-shadow:0 0 12px rgba(116,255,77,.55);
      mix-blend-mode:screen;
      white-space:nowrap;
      animation:fall linear infinite;
    }
    @keyframes fall{
      from{translate:0 -10vh}
      to{translate:0 115vh}
    }

    .eye-img{
      position:absolute;
      width:var(--eye-size, 96px);
      height:auto;
      opacity:var(--eye-opacity, .96);
      filter:drop-shadow(0 0 22px rgba(247,255,233,.60)) drop-shadow(0 0 18px rgba(255,16,56,.30)) contrast(1.28) saturate(1.15) brightness(1.08);
      animation:eyeFloat var(--eye-speed, 1.7s) ease-in-out infinite alternate;
      mix-blend-mode:normal;
      transform-origin:center;
      user-select:none;
      -webkit-user-drag:none;
    }
    @keyframes eyeFloat{
      from{translate:0 -6px; scale:.96}
      to{translate:0 8px; scale:1.06}
    }


    .eye-under-layer img{
      position:absolute;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }
    .hole-eyes-img{
      width:min(50vw,560px);
      max-height:48vh;
      object-fit:contain;
      opacity:.84;
      filter:drop-shadow(0 0 24px rgba(247,255,233,.35)) drop-shadow(0 0 20px rgba(255,16,56,.24)) contrast(1.12) saturate(1.06);
      mix-blend-mode:normal;
      transform:translate(-50%,-50%);
    }
    .face-eye-img{
      width:clamp(105px,15vw,245px);
      opacity:.95;
      filter:drop-shadow(0 0 22px rgba(255,16,56,.34)) drop-shadow(0 0 14px rgba(247,255,233,.18)) contrast(1.08) saturate(1.03);
      mix-blend-mode:normal;
    }
    .face-eye-img.tl{left:0;top:0;transform:translate(-8%,-8%)}
    .face-eye-img.tr{right:0;top:0;transform:translate(8%,-8%) scaleX(-1)}
    .face-eye-img.bl{left:0;bottom:0;transform:translate(-8%,8%)}
    .face-eye-img.br{right:0;bottom:0;transform:translate(8%,8%) scaleX(-1)}
    @media (max-width:560px){
      .hole-eyes-img{width:min(62vw,330px);max-height:38vh;opacity:.78}
      .face-eye-img{width:clamp(84px,22vw,138px)}
    }

    .warning-log{
      position:fixed;
      left:14px;
      right:14px;
      bottom:48px;
      z-index:9;
      display:none;
      max-width:820px;
      margin:auto;
      padding:12px 14px;
      border:1px solid rgba(116,255,77,.36);
      background:rgba(0,0,0,.78);
      color:var(--bad-green);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      font-size:13px;
      line-height:1.5;
      box-shadow:0 0 38px rgba(116,255,77,.12);
    }

    /* ===== corrupted base ===== */
    body.corrupted{
      color:var(--bad-ink);
      background:
        radial-gradient(900px 640px at 20% 18%, rgba(255,16,56,.22), transparent 58%),
        radial-gradient(800px 520px at 82% 28%, rgba(116,255,77,.15), transparent 62%),
        radial-gradient(700px 540px at 50% 100%, rgba(157,64,255,.18), transparent 64%),
        linear-gradient(180deg,#050305,#110205 42%,#030503);
      animation:screenPulse 1.6s steps(2,end) infinite;
    }
    body.corrupted::before{
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(90deg, rgba(255,16,56,.10) 0 1px, transparent 1px 9px),
        radial-gradient(circle at 20% 22%, rgba(255,16,56,.38), transparent 18%),
        radial-gradient(circle at 74% 38%, rgba(116,255,77,.30), transparent 16%);
      opacity:.78;
      mix-blend-mode:screen;
    }
    body.corrupted::after{
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.22), transparent 3px),
        radial-gradient(circle at 70% 30%, rgba(116,255,77,.28), transparent 2px),
        radial-gradient(circle at 46% 72%, rgba(255,16,56,.30), transparent 3px);
      background-size:70px 80px, 110px 120px, 160px 150px;
      opacity:.68;
      animation:sporeDrift 2.4s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes screenPulse{
      0%,100%{filter:none}
      50%{filter:contrast(1.22) saturate(1.25) hue-rotate(-8deg)}
    }
    @keyframes sporeDrift{to{transform:translate3d(-30px,40px,0)}}

    body.corrupted .mush{
      opacity:.92;
      filter:drop-shadow(0 0 20px rgba(116,255,77,.32)) contrast(1.4) saturate(1.4);
      animation:badBob .42s steps(2,end) infinite;
    }
    body.corrupted .mush::before{
      background:
        radial-gradient(circle at 26% 30%, #f7ffe9 0 5px, transparent 6px),
        radial-gradient(circle at 57% 22%, #f7ffe9 0 4px, transparent 5px),
        radial-gradient(circle at 74% 48%, #f7ffe9 0 5px, transparent 6px),
        linear-gradient(180deg,#52111f,#ff1038 58%,#1b0108);
      border-color:rgba(116,255,77,.38);
    }
    body.corrupted .mush::after{
      background:#d6ffc4;
      border-color:rgba(255,16,56,.44);
    }
    body.corrupted .mush .eye{
      width:13px; height:13px;
      background:#f7ffe9;
      border:3px solid #050305;
      box-shadow:0 0 18px rgba(247,255,233,.55);
    }
    body.corrupted .mush .eye.l{left:28px; top:45px}
    body.corrupted .mush .eye.r{left:47px; top:47px}
    body.corrupted .mush .mouth{
      left:34px; top:64px;
      width:22px; height:12px;
      background:#050305;
      border:2px solid rgba(255,16,56,.9);
      border-radius:0 0 999px 999px;
      box-shadow:0 0 18px rgba(255,16,56,.48);
    }
    @keyframes badBob{
      0%,100%{translate:0 0; rotate:0deg}
      50%{translate:3px -5px; rotate:2deg}
    }

    body.corrupted .panel{
      border-radius:0;
      background:rgba(0,0,0,.80);
      border:1px solid rgba(116,255,77,.28);
      box-shadow:0 0 90px rgba(255,16,56,.22), inset 0 0 0 1px rgba(255,16,56,.32);
      animation:panelGlitch .16s steps(2,end) infinite;
    }
    @keyframes panelGlitch{
      0%,100%{transform:translate(0,0)}
      50%{transform:translate(1px,-1px)}
    }
    body.corrupted .cute-head{
      background:
        repeating-linear-gradient(90deg, rgba(255,16,56,.20) 0 8px, rgba(116,255,77,.12) 8px 13px, rgba(0,0,0,.0) 13px 19px),
        #090909;
      border-bottom:1px solid rgba(116,255,77,.22);
    }
    body.corrupted .logo,
    body.corrupted .side h1{
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      color:var(--bad-green);
      text-shadow:2px 0 var(--bad-red), -2px 0 var(--bad-purple), 0 0 20px rgba(116,255,77,.35);
      letter-spacing:.02em;
    }
    body.corrupted .logo-mark{
      background:
        radial-gradient(circle at 35% 34%, #fff 0 9px, transparent 10px),
        radial-gradient(circle at 65% 32%, #fff 0 8px, transparent 9px),
        linear-gradient(180deg,#35020d,#ff1038);
      border-color:rgba(116,255,77,.45);
    }
    body.corrupted .status-pill{
      background:#060606;
      color:var(--bad-green);
      border-color:rgba(116,255,77,.48);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      box-shadow:0 0 30px rgba(116,255,77,.12);
    }
    body.corrupted .status-dot{
      background:var(--bad-red);
      box-shadow:0 0 0 7px rgba(255,16,56,.15), 0 0 22px rgba(255,16,56,.8);
    }
    body.corrupted .video-card{
      border-right:1px solid rgba(116,255,77,.22);
    }
    body.corrupted .thumb-shell{
      border-color:rgba(116,255,77,.28);
      border-radius:0;
      box-shadow:0 0 60px rgba(255,16,56,.20);
    }
    body.corrupted .caption,
    body.corrupted .side p{
      color:var(--bad-muted);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
    }
    body.corrupted .cute-btn{
      background:#080808;
      color:var(--bad-green);
      border:1px solid rgba(116,255,77,.38);
      box-shadow:0 0 30px rgba(116,255,77,.12);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
    }
    body.corrupted .cute-btn.secondary{
      color:var(--bad-yellow);
      border-color:rgba(255,240,90,.4);
    }
    body.corrupted .marquee{
      background:#020202;
      border-top:1px solid rgba(116,255,77,.4);
      color:var(--bad-green);
      font-family:"MS Gothic","Yu Gothic Mono",monospace;
      text-shadow:0 0 12px rgba(116,255,77,.45);
    }
    body.corrupted .mojibake-layer{opacity:1}
    body.corrupted .warning-log{display:block}

    .flash{
      position:fixed;
      inset:0;
      z-index:99;
      background:#fff;
      pointer-events:none;
      opacity:0;
    }
    .flash.active{animation:flashBang .58s steps(3,end)}
    @keyframes flashBang{
      0%{opacity:0}
      12%{opacity:1}
      26%{opacity:.15}
      42%{opacity:.9}
      100%{opacity:0}
    }



    .timeline-overlay{
      position:fixed;
      inset:0;
      z-index:98;
      pointer-events:none;
      opacity:0;
      transition:opacity .04s linear;
    }
    .timeline-overlay.invert{
      opacity:1;

        const edge = 10;

        const videoRect = videoShell?.getBoundingClientRect?.();

        if (!videoRect || videoRect.width <= 0 || videoRect.height <= 0) {
          return {
            x: randomBetween(width / 2 + edge, viewportWidth - width / 2 - edge),
            y: randomBetween(height / 2 + edge, viewportHeight - height / 2 - bottomGuard)
          };
        }

        const margin = 22;
        const protectedRect = {
          left: Math.max(0, videoRect.left - margin),
          top: Math.max(0, videoRect.top - margin),
          right: Math.min(viewportWidth, videoRect.right + margin),
          bottom: Math.min(viewportHeight, videoRect.bottom + margin)
        };

        const xMin = width / 2 + edge;
        const xMax = viewportWidth - width / 2 - edge;
        const yMin = height / 2 + edge;
        const yMax = viewportHeight - height / 2 - bottomGuard;

        const candidates = [
          { name: "top", left: xMin, right: xMax, top: yMin, bottom: protectedRect.top - height / 2 },
          { name: "bottom", left: xMin, right: xMax, top: protectedRect.bottom + height / 2, bottom: yMax },
          { name: "left", left: xMin, right: protectedRect.left - width / 2, top: yMin, bottom: yMax },
          { name: "right", left: protectedRect.right + width / 2, right: xMax, top: yMin, bottom: yMax }
        ].map((zone) => ({
          ...zone,
          area: Math.max(0, zone.right - zone.left) * Math.max(0, zone.bottom - zone.top)
        })).filter((zone) => zone.area > 0);

        if (candidates.length > 0) {
          const zone = weightedChoice(candidates);
          return {
            x: randomBetween(zone.left, zone.right),
            y: randomBetween(zone.top, zone.bottom)
          };
        }

        const fallbackTopSpace = Math.max(0, protectedRect.top - edge);
        const fallbackBottomSpace = Math.max(0, viewportHeight - protectedRect.bottom - bottomGuard);
        const preferTop = fallbackTopSpace >= fallbackBottomSpace;
        return {

            data[i + 3] = Math.round(alpha * 0.32);
          } else if (isBlue && b > r && b > g) {
            data[i + 2] = Math.max(0, b - Math.max(10, dominance * 0.35));
          } else if (!isBlue && g > r && g > b) {
            data[i + 1] = Math.max(0, g - Math.max(10, dominance * 0.35));
          }
        }
        ctx.putImageData(frame, 0, 0);
      }

      function drawChromaActor(actor, timestamp) {
        if (!actor.active || !actor.video || !actor.ctx || !actor.canvas) return;
        if (timestamp - actor.lastDraw < (actor.interval || 33)) return;
        actor.lastDraw = timestamp;
        const { w, h } = configureCanvas(actor);
        if (!w || !h || actor.video.readyState < 2) return;
        const ctx = actor.ctx;
        ctx.clearRect(0, 0, w, h);
        const rect = videoDrawRect(actor.video, w, h, actor.mode);
        ctx.drawImage(actor.video, rect.dx, rect.dy, rect.dw, rect.dh);
        removeChromaPixels(actor, w, h);
      }

      function chromaLoop(timestamp) {
        let anyActive = false;
        Object.values(chromaActors).forEach((actor) => {
          if (actor.active) {
            anyActive = true;
            drawChromaActor(actor, timestamp);
          }
        });
        chromaRaf = anyActive ? requestAnimationFrame(chromaLoop) : 0;
      }

      function startChromaActor(id, label) {
        const actor = chromaActors[id];
        if (!actor || actor.active) return;
        updateProtectedVisualZones();
        actor.active = true;
        actor.layer?.classList.add("active");
        actor.video.muted = true;
        actor.video.loop = true;
        actor.video.playsInline = true;
        actor.video.currentTime = 0;
        actor.video.play().catch(() => {});
        if (!chromaRaf) chromaRaf = requestAnimationFrame(chromaLoop);
        writeLog(label);
      }

      function stopChromaActor(id) {
        const actor = chromaActors[id];
        if (!actor || !actor.active) return;
        actor.active = false;
        actor.layer?.classList.remove("active");
        actor.video.pause();
        if (actor.ctx && actor.canvas) {
          actor.ctx.clearRect(0, 0, actor.canvas.width, actor.canvas.height);
        }
      }

      function stopAllChromaActors() {
        Object.keys(chromaActors).forEach(stopChromaActor);
        document.body.classList.remove(
          "fx-chroma-donald",
          "fx-chroma-starmie",
          "fx-chroma-runner",
          "fx-chroma-meme",
          "fx-chroma-catdance",
          "fx-chroma-popcat",
          "fx-chroma-chipicat",
          "fx-chroma-reimu",
          "fx-chroma-naruto"
        );
      }

      function syncChromaByTime(now) {
        for (const item of timelineChromaWindows) {
          const shouldBeActive = now >= item.start && now < item.end;
          const actor = chromaActors[item.id];
          const isActive = Boolean(actor?.active);
          if (shouldBeActive && !isActive) {
            document.body.classList.add(item.className);
            startChromaActor(item.id, item.label);
          } else if (!shouldBeActive && isActive) {
            document.body.classList.remove(item.className);
            stopChromaActor(item.id);
          }
        }
      }


      function startRunnerLayer(_label) {
        // Runner is now handled by the shared chroma actor pipeline.
      }

      function stopRunnerLayer() {
        stopChromaActor("runner");
        document.body.classList.remove("fx-chroma-runner");
      }

      function syncRunnerByTime(_now) {
        // Runner timing is included in timelineChromaWindows.
      }

      function resetTimelineForReplay() {
        fired = new Set();
        clearBackgroundEffects();
        activeTimedClasses.forEach((className) => document.body.classList.remove(className));
        activeTimedClasses.clear();
        stopMushroomRain();
        stopTabStorm();
        stopAllChromaActors();
        setEightTextMode(false);
        stopRunnerLayer();
        rainLayer.innerHTML = "";
        if (tabStormLayer) tabStormLayer.innerHTML = "";
        if (crossLayer) crossLayer.replaceChildren();
        if (crossLayer) crossLayer.classList.remove("active");
        crossLayerCount = -1;
        glitchRate = 0.18;
        activeBackgroundKey = "";
        lastTimelineTime = 0;
      }

      function preloadTimelineImages() {
        PRELOAD_IMAGES.forEach((src) => {
          const img = new Image();
          img.decoding = "async";
          img.src = src;
        });
        CHROMA_VIDEO_SOURCES.forEach((src) => {
          const video = document.createElement("video");
          video.src = src;
          video.muted = true;
          video.preload = "auto";
        });
      }

      function enterCorruptionBase() {
        preloadTimelineImages();
        document.body.classList.add("corrupted");
        document.documentElement.lang = "ja";
        document.title = "ﾄﾞｺﾉｺﾉｷﾉｺ.exe";
        buildMojibakeRain();
        startMojibake();
        startLogs();
        flashBang();
        glitchRate = 0.20;
      }

      function endToCorruptedIdle() {
        stopMushroomRain();
        stopTabStorm();
        stopAllChromaActors();
        setEightTextMode(false);
        stopRunnerLayer();
        clearBackgroundEffects();
        activeTimedClasses.forEach((className) => document.body.classList.remove(className));
        activeTimedClasses.clear();
        rainLayer.innerHTML = "";
        if (tabStormLayer) tabStormLayer.innerHTML = "";
        if (crossLayer) crossLayer.replaceChildren();
        if (crossLayer) crossLayer.classList.remove("active");
        crossLayerCount = -1;
        document.body.classList.add("corrupted");
        glitchRate = 0.22;
        writeLog("[END] 狂気版通常状態へ復帰しました");
        document.title = "ドコノコノキノコ.exe";
      }



      function getActiveBackground(now) {
        return timelineBackgrounds.find((item) => now >= item.start && now < item.end) || null;
      }

      function syncBackgroundByTime(now) {
        const current = getActiveBackground(now);
        const nextKey = current ? current.key : "";
        if (activeBackgroundKey === nextKey) return;

        clearBackgroundEffects(false);
        activeBackgroundKey = nextKey;

        if (!current) return;
        document.body.classList.add(current.className);
        if (current.className === "fx-eyes") { buildEyeLayer(); updateEyeUnderLayerLayout(); }
        writeLog(current.label);
      }

      function syncClassWindows(now) {
        for (const item of timelineClassWindows) {
          const shouldBeActive = now >= item.start && now < item.end;
          const isActive = activeTimedClasses.has(item.className);
          if (shouldBeActive && !isActive) {
            document.body.classList.add(item.className);
            activeTimedClasses.add(item.className);
            if (item.className === "fx-mosaic") updateMosaicMask();
            writeLog(item.label);
          } else if (!shouldBeActive && isActive) {
            document.body.classList.remove(item.className);
            activeTimedClasses.delete(item.className);
          }
        }
      }

      function syncRainByTime(now) {
        const rainWindow = timelineRainWindows.find((item) => now >= item.start && now < item.end);
        if (rainWindow) {
          startMushroomRain(rainWindow.label);
        } else if (rainActive) {
          stopMushroomRain();
        }
      }

      function syncTabStormByTime(now) {
        const stormWindow = timelineTabStormWindows.find((item) => now >= item.start && now < item.end);
        if (stormWindow) {
          startTabStorm(stormWindow.label);
        } else if (tabStormActive) {
          stopTabStorm();
        }
      }


      function resetOneShotEventsAfter(time) {
        for (const event of timelineEvents) {
          if (event.time >= time - 0.35) {
            fired.delete(event.id);
          }
        }
      }

      function checkTimeline() {
        if (!playerReady || !player || typeof player.getCurrentTime !== "function") return;
        const now = player.getCurrentTime();

        if (now < 1 && fired.size > 0) {
          resetTimelineForReplay();
        }

        if (lastTimelineTime && now + 0.45 < lastTimelineTime) {
          resetOneShotEventsAfter(now);
          syncBackgroundByTime(now);
          syncClassWindows(now);
          syncRainByTime(now);
          syncTabStormByTime(now);
          syncEightTextByTime(now);
          syncCrossLayerByTime(now);
          syncChromaByTime(now);
          syncRunnerByTime(now);
        }
        lastTimelineTime = now;

        if (document.body.classList.contains("fx-mosaic") || document.body.classList.contains("fx-chroma-donald")) {
          updateProtectedVisualZones();
        }
        updateProtectedVisualZones();
        syncBackgroundByTime(now);
        syncClassWindows(now);
        syncRainByTime(now);
        syncTabStormByTime(now);
        syncEightTextByTime(now);
        syncCrossLayerByTime(now);
        syncChromaByTime(now);

        for (const event of timelineEvents) {
          if (now >= event.time && !fired.has(event.id)) {
            fired.add(event.id);
            event.action();
          }
        }

        glitchRate = Math.min(0.72, 0.18 + now / 230);
      }

      function startTimelineMonitor() {
        if (timelineTimer) clearInterval(timelineTimer);
        timelineTimer = setInterval(checkTimeline, 50);
      }

      function stopTimelineMonitor() {
        if (timelineTimer) {
          clearInterval(timelineTimer);
          timelineTimer = null;
        }
      }

      function loadYouTubeAPI() {
        return new Promise((resolve) => {
          if (window.YT && window.YT.Player) {
            resolve();
            return;
          }

          const old = window.onYouTubeIframeAPIReady;
          window.onYouTubeIframeAPIReady = () => {
            if (typeof old === "function") {
              try { old(); } catch (_) {}
            }
            resolve();
          };

          if (!document.querySelector("script[src='https://www.youtube.com/iframe_api']")) {
            const tag = document.createElement("script");
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
          }
        });
      }

      async function startMainVideo() {
        if (timelineStarted) return;
        timelineStarted = true;

        enterCorruptionBase();
        coverThumb.remove();
        thumbOverlay.remove();

        const playerDiv = document.createElement("div");
        playerDiv.id = "player";
        videoShell.appendChild(playerDiv);
        updateProtectedVisualZones();

        await loadYouTubeAPI();

        player = new YT.Player("player", {
          videoId: MAIN_VIDEO_ID,
          playerVars: {
            autoplay: 1,
            playsinline: 1,
            rel: 0,
            modestbranding: 1,
            controls: 1
          },
          events: {
            onReady: (event) => {
              playerReady = true;
              writeLog("[YT_API] Player ready");
              try { event.target.playVideo(); } catch (_) {}
              startTimelineMonitor();
            },
            onStateChange: (event) => {
              if (!window.YT || !window.YT.PlayerState) return;
              if (event.data === YT.PlayerState.PLAYING) {
                startTimelineMonitor();
              } else if (event.data === YT.PlayerState.ENDED) {
                stopTimelineMonitor();
                endToCorruptedIdle();
              }
            },
            onError: () => {
              writeLog("[YT_API] 動画の読み込みに失敗しました");
            }
          }
        });
      }

      enterBtn.addEventListener("click", startMainVideo);
      panicBtn.addEventListener("click", startMainVideo);

      window.addEventListener("resize", () => {
        updateProtectedVisualZones();
        if (crossLayer?.classList.contains("active")) {
          const now = player && typeof player.getCurrentTime === "function" ? player.getCurrentTime() : timelineCrossWindow.start;
          crossLayerCount = -1;
          syncCrossLayerByTime(now);
        }
      }, { passive: true });
      window.addEventListener("scroll", updateProtectedVisualZones, { passive: true });
      updateProtectedVisualZones();

      document.addEventListener("keydown", (event) => {
        if (event.shiftKey && event.key.toLowerCase() === "r") {
          location.reload();
        }
      });
    })();
  </script>
